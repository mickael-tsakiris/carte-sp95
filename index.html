<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a2332">
<title>TotalEnergies SP95 — Paris 17 / Bercheres</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Inter',system-ui,sans-serif;background:#FAF8F5;height:100vh;height:100dvh;display:flex;flex-direction:column}
.header{background:#1a2332;color:#FAF8F5;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header h1{font-size:17px;font-weight:600}
.header .sub{font-size:11px;color:rgba(250,248,245,0.5);margin-top:2px}
.header .right{text-align:right;flex-shrink:0}
.header .count{font-size:28px;font-weight:700;color:#2ecc71}
.header .label{font-size:9px;color:rgba(250,248,245,0.5);text-transform:uppercase;letter-spacing:0.08em}
.main{display:flex;flex:1;overflow:hidden;position:relative}
#map{flex:1;min-width:0}
.sidebar{width:360px;flex-shrink:0;background:white;border-left:1px solid #E5DDD3;display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:16px 20px 12px;border-bottom:1px solid #E5DDD3;display:flex;justify-content:space-between;align-items:center}
.sidebar-header h2{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:#2ecc71}
.sidebar-list{overflow-y:auto;flex:1}
.card{padding:14px 20px;border-bottom:1px solid #F0EEE9;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background 0.15s}
.card:hover{background:#FAF8F5}
.card .left{flex:1;min-width:0}
.card .name{font-size:14px;font-weight:600;color:#1a2332;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .addr{font-size:11px;color:#999;margin-top:1px}
.card .right{text-align:right;flex-shrink:0;margin-left:12px}
.card .prix{font-size:18px;font-weight:700;color:#1a2332}
.card .carb{font-size:10px;color:#2ecc71;font-weight:600;margin-top:2px}
.card .dist{font-size:11px;color:#999;margin-top:2px}
.leaflet-popup-content{font-family:-apple-system,'Inter',sans-serif;font-size:14px;line-height:1.5;min-width:220px}
.pv{font-weight:700;font-size:16px;color:#1a2332}
.pa{font-size:12px;color:#6B6B6B;margin:2px 0 8px}
.pprix{font-size:22px;font-weight:700;color:#1a2332;margin:4px 0}
.pcarb{font-size:12px;font-weight:600;color:#2ecc71;margin-bottom:4px}
.pd{font-size:12px;background:#F5F0EB;display:inline-block;padding:2px 8px;border-radius:4px;margin-top:4px}
.pm{font-size:10px;color:#999;margin-top:6px}
.pnav{display:inline-block;margin-top:10px;background:#1a2332;color:white;padding:8px 16px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none}
.locate-btn{position:absolute;bottom:24px;right:24px;z-index:999;width:44px;height:44px;background:white;border:none;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.2);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#1a2332;color:white;padding:8px 20px;border-radius:20px;font-size:12px;font-weight:500;z-index:2000;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
.badge{position:absolute;bottom:24px;left:16px;z-index:999;background:white;padding:10px 14px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.15);font-size:11px;line-height:1.6;display:flex;align-items:center;gap:8px}
.badge-dot{width:10px;height:10px;border-radius:50%;background:#2ecc71;flex-shrink:0}
@media(max-width:900px){
  .sidebar{display:none}
  .sheet{position:fixed;bottom:0;left:0;right:0;background:white;border-radius:16px 16px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,0.15);z-index:1000;max-height:45dvh;transform:translateY(calc(100% - 44px));transition:transform 0.3s}
  .sheet.open{transform:translateY(0)}
  .sheet-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:10px auto;cursor:pointer}
  .sheet-list-m{overflow-y:auto;max-height:calc(45dvh - 70px);-webkit-overflow-scrolling:touch;padding-bottom:env(safe-area-inset-bottom,16px)}
  .locate-btn{bottom:56px;right:16px}
  .badge{bottom:56px;left:10px;font-size:10px;padding:8px 10px}
}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>TotalEnergies — Paris 17 / Bercheres</h1>
    <div class="sub" id="lastUpdate">SP95 et E10 confirmes — source: prix-carburants.gouv.fr</div>
  </div>
  <div class="right">
    <div class="count" id="stationCount">9</div>
    <div class="label">stations confirmees</div>
  </div>
</div>
<div class="main">
  <div id="map"></div>
  <button class="locate-btn" onclick="locateMe()" title="Ma position">&#9737;</button>
  <div class="badge"><div class="badge-dot"></div>SP95/E10 confirme — donnees gouv</div>
  <div class="sidebar">
    <div class="sidebar-header"><h2>SP95/E10 confirme</h2></div>
    <div class="sidebar-list" id="stationList"></div>
  </div>
</div>
<div class="sheet" id="sheet" style="display:none">
  <div class="sheet-handle" onclick="document.getElementById('sheet').classList.toggle('open')"></div>
  <div class="sidebar-header"><h2>SP95/E10 confirme</h2></div>
  <div class="sheet-list-m" id="stationListM"></div>
</div>
<div class="toast" id="toast"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var route=[[48.8876, 2.3225], [48.884, 2.28], [48.892, 2.24], [48.895, 2.19], [48.89, 2.14], [48.88, 2.05], [48.87, 1.95], [48.86, 1.85], [48.85, 1.75], [48.845, 1.65], [48.843, 1.58], [48.842, 1.542]];
var stations=[{"lat": 48.888, "lon": 2.188, "label": "93 Avenue Vladimir Illitch Lénine", "ville": "Nanterre", "prix": "2.129", "carburant": "E10", "maj": "2026-04-09 06:22:07", "cp": "92000", "dist": 0.7}, {"lat": 48.862, "lon": 2.216, "label": "138 BOULEVARD HENRI SELLIER", "ville": "Suresnes", "prix": "2.029", "carburant": "E10", "maj": "2026-04-03 11:22:39", "cp": "92150", "dist": 3.5}, {"lat": 48.9, "lon": 2.373, "label": "BLD DU PERIPHERIQUE INTERIEUR", "ville": "Paris", "prix": "1.990", "carburant": "E10", "maj": "2026-04-09 00:01:00", "cp": "75019", "dist": 3.9}, {"lat": 48.827841660000004, "lon": 2.2713364300000003, "label": "18-22 BLD DES FRERES VOISIN", "ville": "Issy-les-Moulineaux", "prix": "1.960", "carburant": "E10", "maj": "2026-04-09 11:51:10", "cp": "92130", "dist": 6.3}, {"lat": 48.951634109562, "lon": 2.2122929705522, "label": "5-7 BLD DES MARTYRS DE CHATEAUBRIAND", "ville": "Argenteuil", "prix": "1.950", "carburant": "E10", "maj": "2026-04-09 00:01:00", "cp": "95100", "dist": 6.4}, {"lat": 48.824, "lon": 2.128, "label": "100 Rue de Versailles", "ville": "Le Chesnay", "prix": "2.079", "carburant": "E10", "maj": "2026-04-07 11:05:40", "cp": "78150", "dist": 7.1}, {"lat": 48.94070118, "lon": 1.95295914, "label": "AUTOROUTE A13 - AIRE DE MORAINVILLIERS SUD", "ville": "MORAINVILLIERS", "prix": "1.990", "carburant": "E10", "maj": "2026-04-09 00:01:00", "cp": "78630", "dist": 7.7}, {"lat": 48.957, "lon": 2.284, "label": "239 Route d'Enghien", "ville": "Argenteuil", "prix": "2.069", "carburant": "E10", "maj": "2026-04-03 11:24:21", "cp": "95100", "dist": 7.8}, {"lat": 48.967, "lon": 2.262, "label": "38-42 BOULEVARD GABRIEL PERI", "ville": "SANNOIS", "prix": "1.990", "carburant": "SP95", "maj": "2026-04-07 07:48:53", "cp": "95110", "dist": 8.5}];
var map=L.map("map",{zoomControl:true}).setView([48.86,1.93],11);
L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{attribution:'&copy; OSM &copy; CARTO | prix-carburants.gouv.fr',subdomains:"abcd",maxZoom:18}).addTo(map);
L.polyline(route,{color:"#1a2332",weight:3,opacity:0.4,dashArray:"8,8"}).addTo(map);
L.marker([48.8876,2.3225],{icon:L.divIcon({html:'<div style="background:white;color:#333;padding:5px 12px;border-radius:16px;font-size:13px;font-weight:500;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,0.3);border:1px solid rgba(0,0,0,0.08)"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#e74c3c;margin-right:6px;vertical-align:middle"></span>Paris 17e</div>',className:'',iconAnchor:[50,16]})}).addTo(map);
L.marker([48.842,1.542],{icon:L.divIcon({html:'<div style="background:white;color:#333;padding:5px 12px;border-radius:16px;font-size:13px;font-weight:500;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,0.3);border:1px solid rgba(0,0,0,0.08)"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#e74c3c;margin-right:6px;vertical-align:middle"></span>Bercheres-sur-Vesgre</div>',className:'',iconAnchor:[85,16]})}).addTo(map);

var markerRefs=[];
var myLocMarker=null;
var isMobile=window.innerWidth<=900;
if(isMobile) document.getElementById("sheet").style.display="block";

function showToast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2500)}

function locateMe(){
  if(!navigator.geolocation)return showToast("Geolocalisation non disponible");
  navigator.geolocation.getCurrentPosition(function(p){
    var ll=[p.coords.latitude,p.coords.longitude];
    if(myLocMarker)map.removeLayer(myLocMarker);
    myLocMarker=L.circleMarker(ll,{radius:8,fillColor:"#4285F4",fillOpacity:1,color:"white",weight:3}).addTo(map);
    map.setView(ll,13);showToast("Position mise a jour");
  },function(){showToast("Position refusee")},{enableHighAccuracy:true});
}

function flyTo(i){var m=markerRefs[i];if(m){map.setView(m.getLatLng(),14);m.openPopup()}}
function flyToM(i){flyTo(i);document.getElementById("sheet").classList.remove("open")}

var html="";
stations.forEach(function(s,i){
  var icon=L.divIcon({html:'<div style="background:#2ecc71;width:16px;height:16px;border-radius:50%;border:3px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.3)"></div>',className:'',iconSize:[22,22],iconAnchor:[11,11]});
  var m=L.marker([s.lat,s.lon],{icon:icon}).addTo(map);
  var nav="https://www.google.com/maps/dir/?api=1&destination="+s.lat+","+s.lon;
  m.bindPopup('<div class="pv">TotalEnergies</div><div class="pa">'+s.label+(s.ville?', '+s.ville:'')+(s.cp?' ('+s.cp+')':'')+'</div><div class="pcarb">'+s.carburant+' disponible</div><div class="pprix">'+s.prix+' EUR/L</div><div class="pd">'+s.dist+' km du trajet</div><div class="pm">Maj: '+s.maj+'</div><a class="pnav" href="'+nav+'" target="_blank" rel="noopener">Y aller</a>');
  markerRefs.push(m);
  html+='<div class="card" onclick="flyTo('+i+')"><div class="left"><div class="name">'+(s.ville||s.label)+(s.cp?' ('+s.cp+')':'')+'</div><div class="addr">'+s.label+'</div></div><div class="right"><div class="prix">'+s.prix+'</div><div class="carb">'+s.carburant+'</div><div class="dist">'+s.dist+' km</div></div></div>';
});
document.getElementById("stationList").innerHTML=html;
if(isMobile) document.getElementById("stationListM").innerHTML=html.replace(/flyTo\(/g,"flyToM(");
map.fitBounds(L.polyline(route).getBounds().pad(0.15));

if(isMobile){
  var sh=document.getElementById("sheet"),tsy=0;
  sh.addEventListener("touchstart",function(e){tsy=e.touches[0].clientY});
  sh.addEventListener("touchmove",function(e){var d=tsy-e.touches[0].clientY;if(d>30)sh.classList.add("open");if(d<-30)sh.classList.remove("open")});
}
</script>
</body>
</html>
